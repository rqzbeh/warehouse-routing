apiVersion: apps/v1
kind: Deployment
metadata:
  name: warehouse-routing
  labels:
    app: warehouse-routing
spec:
  replicas: 2
  selector:
    matchLabels:
      app: warehouse-routing
  template:
    metadata:
      labels:
        app: warehouse-routing
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: api
          image: warehouse-routing:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          env:
            - name: PORT
              value: "8080"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: warehouse-routing
                  key: database-url
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 2
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
            timeoutSeconds: 2
