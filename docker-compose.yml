services:
  api:
    build: .
    environment:
      DATABASE_URL: postgres://routing:routing@db:5432/routing?sslmode=disable
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: routing
      POSTGRES_USER: routing
      POSTGRES_PASSWORD: routing
    volumes:
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U routing -d routing"]
      interval: 5s
      timeout: 3s
      retries: 20
