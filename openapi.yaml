        "200":
          description: Selected warehouse
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RouteDecision"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No warehouse has enough inventory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Inventory changed before reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  schemas:
    Location:
      type: object
      required: [lat, lon]
      properties:
        lat:
          type: number
          minimum: -90
          maximum: 90
        lon:
          type: number
          minimum: -180
          maximum: 180
    TransportationCost:
      type: object
      required: [warehouse_id, cost, eta_minutes]
      properties:
        warehouse_id:
          type: string
          minLength: 1
        cost:
          type: number
          minimum: 0
        eta_minutes:
          type: integer
          minimum: 1
    LogisticsConstraint:
      type: object
      required: [warehouse_id]
      properties:
        warehouse_id:
          type: string
          minLength: 1
        traffic_coefficient:
          type: number
          minimum: 0
          default: 1
        fleet_priority_factor:
          type: number
          minimum: 0
          default: 1
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
    RouteRequest:
      type: object
      required: [customer_location, sku, quantity, transportation_costs]
      properties:
        customer_location:
          $ref: "#/components/schemas/Location"
        sku:
          type: string
          minLength: 1
        quantity:
          type: integer
          minimum: 1
        requested_at:
          type: string
          format: date-time
        expected_delivery_time:
          type: integer
          minimum: 0
          description: Customer expected delivery time in minutes.
        transportation_costs:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/TransportationCost"
        logistics_constraints:
          type: array
          items:
            $ref: "#/components/schemas/LogisticsConstraint"
    RouteDecision:
      type: object
      required: [WarehouseID, EstimatedDeliveryTime, TotalCost, RouteOptimizationScore]
      properties:
        WarehouseID:
          type: string
        EstimatedDeliveryTime:
          type: integer
          description: Minutes
        TotalCost:
          type: number
        RouteOptimizationScore:
          type: number
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
