openapi: 3.1.0
info:
  title: Warehouse Routing Service
  version: 1.0.0
paths:
  /healthz:
    get:
      summary: Process health check
      responses:
        "204":
          description: Process is alive
  /readyz:
    get:
      summary: Database readiness check
      responses:
        "204":
          description: Service is ready
        "503":
          description: Database is unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /route:
    post:
      summary: Select a warehouse and reserve inventory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RouteRequest"
            examples:
