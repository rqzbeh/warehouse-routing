name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: routing
          POSTGRES_USER: routing
          POSTGRES_PASSWORD: routing
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U routing -d routing"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      TEST_DATABASE_URL: postgres://routing:routing@localhost:5432/routing?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
      - run: test -z "$(gofmt -l .)"
      - run: docker run --rm --network host -v "$PWD/migrations:/migrations:ro" -e TEST_DATABASE_URL postgres:17-alpine sh -c 'psql "$TEST_DATABASE_URL" -f /migrations/001_init.sql && psql "$TEST_DATABASE_URL" -f /migrations/002_seed.sql'
      - run: go test ./...
      - run: go vet ./...
      - name: SonarQube scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      COMPOSE_PROJECT_NAME: warehouse-routing
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
      - run: docker compose up -d --build
      - run: for i in $(seq 1 30); do curl -fsS http://localhost:8080/readyz && exit 0; sleep 1; done; exit 1
      - run: python3 scripts/acceptance_test.py http://localhost:8080
      - run: docker run --rm --network warehouse-routing_default -v "$PWD/scripts:/scripts:ro" -e BASE_URL=http://api:8080 -e SKU=PERF-SKU grafana/k6 run /scripts/k6-route.js
      - if: always()
        run: docker compose down -v
