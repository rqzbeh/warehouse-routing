stages:
  - test
  - build
  - security
  - performance
  - deploy

variables:
  GO_VERSION: "1.26.5"
  DOCKER_HOST: "tcp://docker:2375"
  DOCKER_TLS_CERTDIR: ""
  COMPOSE_PROJECT_NAME: "warehouse-routing"
  TEST_DATABASE_URL: "postgres://routing:routing@postgres:5432/routing?sslmode=disable"
  KUBE_NAMESPACE: "warehouse-routing"
  KUBE_CONTEXT: "rqzbeh/warehouse-routing:warehouse-routing"
  CS_IMAGE: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"

include:
  - template: Jobs/SAST.gitlab-ci.yml
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.gitlab-ci.yml
  - template: Jobs/Container-Scanning.gitlab-ci.yml

test:
  stage: test
  image: "golang:${GO_VERSION}-alpine"
  services:
    - name: postgres:17-alpine
      alias: postgres
  variables:
    POSTGRES_DB: routing
    POSTGRES_USER: routing
    POSTGRES_PASSWORD: routing
  before_script:
    - apk add --no-cache postgresql-client
    - until pg_isready -h postgres -U routing -d routing; do sleep 1; done
    - psql "$TEST_DATABASE_URL" -f migrations/001_init.sql
    - psql "$TEST_DATABASE_URL" -f migrations/002_seed.sql
  script:
    - test -z "$(gofmt -l .)"
    - go test ./...
    - go vet ./...

build_image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"

acceptance_and_load:
  stage: performance
  image: docker:27
  services:
    - docker:27-dind
  before_script:
    - apk add --no-cache curl python3
  script:
    - docker info
    - docker compose up -d --build
    - for i in $(seq 1 30); do curl -fsS http://docker:8080/readyz && break; sleep 1; done
    - python3 scripts/acceptance_test.py http://docker:8080
    - docker run --rm --network "${COMPOSE_PROJECT_NAME}_default" -v "$PWD/scripts:/scripts:ro" -e BASE_URL=http://api:8080 grafana/k6 run /scripts/k6-route.js
  after_script:
    - docker compose down -v || true

deploy_kubernetes:
  stage: deploy
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  needs:
    - build_image
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
  script:
    - test -n "$DATABASE_URL"
    - kubectl config use-context "$KUBE_CONTEXT"
    - kubectl create namespace "$KUBE_NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
    - kubectl -n "$KUBE_NAMESPACE" create secret generic warehouse-routing --from-literal=database-url="$DATABASE_URL" --dry-run=client -o yaml | kubectl apply -f -
    - kubectl -n "$KUBE_NAMESPACE" create secret docker-registry gitlab-registry --docker-server="$CI_REGISTRY" --docker-username="$CI_REGISTRY_USER" --docker-password="$CI_REGISTRY_PASSWORD" --dry-run=client -o yaml | kubectl apply -f -
    - |
      sed "s|image: warehouse-routing:latest|image: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA|" k8s/deployment.yaml |
        kubectl -n "$KUBE_NAMESPACE" apply -f -
    - kubectl -n "$KUBE_NAMESPACE" apply -f k8s/service.yaml -f k8s/hpa.yaml
    - kubectl -n "$KUBE_NAMESPACE" rollout status deployment/warehouse-routing --timeout=120s

sast:
  stage: security

secret_detection:
  stage: security

container_scanning:
  stage: security
  needs:
    - build_image
